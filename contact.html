<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - VITCH</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-gray-800 text-white font-sans">

<!-- NAVBAR -->
<header class="flex justify-between items-center p-6 bg-black bg-opacity-50 backdrop-blur-md">
  <h1 class="text-2xl font-bold text-purple-400">VITCH</h1>
  <nav class="space-x-6">
    <a href="index.html" class="hover:text-purple-400 transition">Home</a>
    <a href="services.html" class="hover:text-purple-400 transition">Services</a>
    <a href="about.html" class="hover:text-purple-400 transition">About</a>
    <a href="contact.html" class="hover:text-purple-400 transition">Contact</a>
  </nav>
</header>

<!-- CONTACT CONTENT -->
<section class="px-6 py-16">
  <h2 class="text-4xl font-bold text-center mb-12 text-purple-300">Contact Us</h2>
  <div class="max-w-4xl mx-auto grid md:grid-cols-2 gap-12">

    <!-- Contact Info -->
    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg">
      <h3 class="text-2xl font-bold mb-6 text-blue-400">Get in Touch</h3>
      <div class="space-y-4">
        <div>
          <h4 class="font-bold text-purple-400">Phone Numbers</h4>
          <p class="text-gray-300">+299 0149488847</p>
          <p class="text-gray-300">+229 01 16 22 00 91</p>
        </div>
        <div>
          <h4 class="font-bold text-purple-400">Email</h4>
          <p class="text-gray-300">sctvitch@gmail.com</p>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg">
      <h3 class="text-2xl font-bold mb-6 text-green-400">Send us a Message</h3>
      <form class="space-y-4">
        <div>
          <label class="block text-gray-300 mb-2">Name</label>
          <input type="text" class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:border-purple-500 focus:outline-none" placeholder="Your Name">
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Email</label>
          <input type="email" class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:border-purple-500 focus:outline-none" placeholder="your@email.com">
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Message</label>
          <textarea rows="4" class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:border-purple-500 focus:outline-none" placeholder="Your message..."></textarea>
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 px-6 py-3 rounded-lg font-semibold transition transform hover:scale-105">Send Message</button>
      </form>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="text-center p-6 text-gray-500">
  © 2026 VITCH - All rights reserved
</footer>

</body>
</html>
